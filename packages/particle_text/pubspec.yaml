name: particle_text
description: >
  Interactive particle text effect for Flutter. Thousands of particles form
  text shapes and scatter on touch/hover, with spring-based physics.
version: 0.2.0
homepage: https://github.com/HemangSidapara/particle_packages
repository: https://github.com/HemangSidapara/particle_packages/tree/master/packages/particle_text
issue_tracker: https://github.com/HemangSidapara/particle_packages/issues

topics:
  - particles
  - text
  - animation
  - effects
  - interactive

resolution: workspace

environment:
  sdk: ^3.9.0
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  particle_core: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

