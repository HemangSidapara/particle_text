name: particle_image
description: >
  Interactive image-to-particle effect for Flutter. Renders any image as
  thousands of colored particles that scatter on touch/hover with spring physics.
version: 0.2.0
homepage: https://github.com/HemangSidapara/particle_packages
repository: https://github.com/HemangSidapara/particle_packages/tree/master/packages/particle_image
issue_tracker: https://github.com/HemangSidapara/particle_packages/issues

topics:
  - particles
  - image
  - animation
  - effects
  - interactive

resolution: workspace

environment:
  sdk: ^3.9.0
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  particle_core: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
